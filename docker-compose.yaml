services:
  postgres:
    image: postgres:16
    container_name: postgresrepz
    environment:
      POSTGRES_DB: repz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repz"]
      interval: 5s
      timeout: 5s
      retries: 10


  minio:
    image: minio/minio:latest
    container_name: repzminio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build: ./back
    container_name: repzapi
    ports:
      - "8080:8080"
    env_file: ./back/.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/repz
      DB_USER: postgres
      DB_PASSWORD: postgres
      MINIO_URL: ${MINIO_URL:-http://minio:9000}
      MINIO_EXTERNAL_URL: ${MINIO_EXTERNAL_URL:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-repz}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  front:
    build: ./frontend/repz
    container_name: repzfront
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/repz:/app
      - /app/node_modules
    depends_on:
      - api

  ai-service:
    build: ./ai-service
    container_name: repzai
    volumes:
      - ./ai-service:/app
    ports:
      - "8055:8000"
    env_file: ./ai-service/.env
    restart: unless-stopped

volumes:
  minio_data:
