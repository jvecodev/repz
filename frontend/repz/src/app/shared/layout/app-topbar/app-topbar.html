<div class="topbar-inner">
  <div class="menu-btn-wrap">
    <p-button
      icon="pi pi-bars"
      styleClass="menu-btn repz-icon-button"
      (onClick)="layout.toggleSidebar()"
      [ariaLabel]="'NAV.TOGGLE_MENU' | translate"
    />
  </div>

  <div class="crumbs">
    @for (c of crumbs(); track $index; let last = $last) {
      <span [class.here]="last">{{ c }}</span>
      @if (!last) {
        <span class="sep">/</span>
      }
    }
  </div>

  <div class="topbar-actions">
    <p-button
      severity="secondary"
      [text]="true"
      styleClass="lang-btn repz-icon-button"
      (onClick)="language.alternar()"
      [title]="(language.idioma() === 'pt-BR' ? 'LANG.TO_EN' : 'LANG.TO_PT') | translate"
      [ariaLabel]="(language.idioma() === 'pt-BR' ? 'LANG.TO_EN' : 'LANG.TO_PT') | translate"
    >
      <span class="lang-inner">
        <span class="lang-flag">{{ language.idioma() === 'pt-BR' ? '🇧🇷' : '🇺🇸' }}</span>
        <span class="lang-label">{{ language.idioma() === 'pt-BR' ? 'PT' : 'EN' }}</span>
      </span>
    </p-button>
    <p-button
      [icon]="theme.tema() === 'dark' ? 'pi pi-sun' : 'pi pi-moon'"
      severity="secondary"
      [text]="true"
      styleClass="theme-btn repz-icon-button"
      (onClick)="theme.toggleTema()"
      [title]="(theme.tema() === 'dark' ? 'THEME.TO_LIGHT' : 'THEME.TO_DARK') | translate"
      [ariaLabel]="(theme.tema() === 'dark' ? 'THEME.ARIA_TO_LIGHT' : 'THEME.ARIA_TO_DARK') | translate"
    />
  </div>
</div>
