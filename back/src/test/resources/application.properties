api.security.token.secret=test-secret
# Seeds (db/seed) usam sintaxe Postgres incompatível com o H2 dos testes.
app.seed.enabled=false
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.generate-ddl=false
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=none
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=
spring.mail.password=
spring.mail.test-connection=false
api.password-reset.expiration-minutes=30
api.password-reset.base-url=http://localhost:4200

# MinIO (mock para testes)
minio.url=http://localhost:9000
minio.external-url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=repz
minio.url-expiry-hours=1
