spring.application.name=repz
api.security.token.secret=${JWT_SECRET}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.messages.basename=messages
spring.messages.encoding=UTF-8
logging.level.org.flywaydb=DEBUG
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# MinIO (storage de arquivos)
minio.url=${MINIO_URL:http://localhost:9000}
minio.external-url=${MINIO_EXTERNAL_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:repz}
minio.url-expiry-hours=${MINIO_URL_EXPIRY_HOURS:1}

# E-mail (recuperação de senha)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
management.health.mail.enabled=false
spring.mail.test-connection=false

# Multipart (sem limite de tamanho)
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
api.password-reset.expiration-minutes=30
api.password-reset.base-url=${APP_BASE_URL:http://localhost:4200}
